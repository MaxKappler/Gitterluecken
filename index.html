<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine 3D Modell Galerie</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #ffffff;
            display: flex;
        }

        /* Seitliche Navigationsleiste mit den Modellen */
        #sidebar {
            width: 300px;
            background-color: #141418;
            border-right: 1px solid #2a2a32;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        #sidebar h2 {
            padding: 20px;
            margin: 0;
            font-size: 1.2rem;
            border-bottom: 1px solid #2a2a32;
            background-color: #0f0f12;
        }

        .model-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }

        .model-item {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid #1e1e24;
            transition: background 0.2s, color 0.2s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }

        .model-item:hover {
            background-color: #2a2a32;
        }

        .model-item.active {
            background-color: #3b82f6;
            color: #ffffff;
            font-weight: bold;
        }

        /* Bereich für den 3D Viewer */
        #viewer-container {
            flex-grow: 1;
            height: 100%;
            position: relative;
            background: radial-gradient(circle, #2a2b36 0%, #111218 100%);
        }

        model-viewer {
            width: 100%;
            height: 100%;
        }

        /* Overlay für den Modell-Titel im Viewer */
        #model-title-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 1.1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Anpassungen für Mobilgeräte */
        @media (max-width: 768px) {
            body {
                flex-direction: column-reverse;
            }
            #sidebar {
                width: 100%;
                height: 35%;
            }
            #viewer-container {
                height: 65%;
            }
        }
    </style>
    <!-- Google 3D-Viewer Skript -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body>

    <!-- Linke Menüleiste mit deinen Modellen -->
    <div id="sidebar">
        <h2>3D-Modelle</h2>
        <ul class="model-list">
            <li class="model-item active" data-file="Hdp_OL.glb">Hdp_OL</li>
            <li class="model-item" data-file="Hdp_OL_erweitert.glb">Hdp_OL erweitert</li>
            <li class="model-item" data-file="Hdp_TL.glb">Hdp_TL</li>
            <li class="model-item" data-file="Hdp_TL_erweitert.glb">Hdp_TL erweitert</li>
            <li class="model-item" data-file="kfz_OL_open_ppt.glb">kfz_OL open ppt</li>
            <li class="model-item" data-file="kfz_OL_ppt.glb">kfz_OL ppt</li>
            <li class="model-item" data-file="kfz_TL.glb">kfz_TL</li>
            <li class="model-item" data-file="kfz_TL_open.glb">kfz_TL open</li>
            <li class="model-item" data-file="krz_OL.glb">krz_OL</li>
            <li class="model-item" data-file="krz_OL_erweitert.glb">krz_OL erweitert</li>
            <li class="model-item" data-file="krz_TL.glb">krz_TL</li>
            <li class="model-item" data-file="krz_TL_erweitert.glb">krz_TL erweitert</li>
        </ul>
    </div>

    <!-- Rechter Hauptbereich für den 3D-Viewer -->
    <div id="viewer-container">
        <div id="model-title-overlay">Hdp_OL</div>
        
        <!-- Startet standardmäßig mit dem ersten Modell -->
        <model-viewer 
            id="main-viewer"
            src="Hdp_OL.glb" 
            ar 
            camera-controls 
            touch-action="pan-y" 
            auto-rotate 
            shadow-intensity="1.5" 
            shadow-softness="1"
            alt="3D Viewer">
        </model-viewer>
    </div>

    <!-- JavaScript, um die Modelle per Klick zu wechseln -->
    <script>
        const viewer = document.getElementById('main-viewer');
        const titleOverlay = document.getElementById('model-title-overlay');
        const menuItems = document.querySelectorAll('.model-item');

        menuItems.forEach(item => {
            item.addEventListener('click', () => {
                // Aktiven Menüpunkt wechseln
                menuItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');

                // Modell im Viewer austauschen
                const modelFile = item.getAttribute('data-file');
                viewer.setAttribute('src', modelFile);

                // Titel-Overlay aktualisieren
                titleOverlay.textContent = item.textContent;
            });
        });
    </script>

</body>
</html>
